services:
  - type: web
    name: contacts-la-residence
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: contacts-la-residence-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VITE_RESIDENCE_WHATSAPP_NUMBER
        sync: false

databases:
  - name: contacts-la-residence-db
    databaseName: contacts_la_residence
    user: contacts_la_residence_user
